<!-- TS migration demo entry: mirrors editor/index.html but loads ts-migration bundle -->
<!DOCTYPE html>
<html><head>
    <title>LiteGraph (TS Migration Demo)</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
	<!--<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">-->
	<meta http-equiv="X-UA-Compatible" content="chrome=1">

    <link rel="stylesheet" type="text/css" href="../dist/css/litegraph.css">
    <link rel="stylesheet" type="text/css" href="css/litegraph-editor.css">
    <link rel="stylesheet" type="text/css" href="style.css">
	</head>
<body>
	<div id="main">
	</div>

    <script type="text/javascript" src="js/libs/jquery-1.6.2.min.js"></script>
    <!-- <script type="text/javascript" src="https://tamats.com/projects/sillyserver/src/sillyclient.js"></script> -->
	<!-- <script type="text/javascript" src="https://unpkg.com/codeflask/build/codeflask.min.js"></script> -->
	<script type="text/javascript" src="js/libs/gl-matrix-min.js"></script>
    <script type="text/javascript" src="js/libs/litegl.js"></script>
    <script type="text/javascript" src="js/libs/audiosynth.js"></script>
    <script type="text/javascript" src="js/libs/midi-parser.js"></script>

    <script type="text/javascript" src="../dist/litegraph.core.ts.js"></script>
    <script type="text/javascript">
      if (
        window.LiteGraphTSMigration &&
        typeof window.LiteGraphTSMigration.assembleLiteGraph === "function"
      ) {
        window.__liteGraphTsDemoBundle = window.LiteGraphTSMigration.assembleLiteGraph({
          attachToGlobal: true,
          attachCommonJsExports: true,
        });
      } else {
        throw new Error("LiteGraph TS migration bundle is unavailable");
      }
    </script>
    <script type="text/javascript" src="js/litegraph-editor.js"></script>
    <script type="text/javascript" src="js/defaults.js"></script>

    <script type="text/javascript" src="js/demos.js"></script>
	<script type="text/javascript" src="js/code.js"></script>

</body>
</html>
